{% extends "layouts/base.html" %}

{% block content %}

<section class="relative min-h-screen overflow-hidden bg-[#06131f]">

    <!-- Atmospheric Glow -->
    <div class="hero-glow"></div>

    <!-- Sacred Geometry -->
    <div class="sacred-grid opacity-20"></div>

    <!-- Floating Particles -->
    <div class="absolute inset-0 overflow-hidden">
    {% for i in range(25) %}
        <div class="particle"></div>
    {% endfor %}
</div>
       

    <!-- Main Content -->
    <div class="relative z-10 flex min-h-screen items-center justify-center px-6">

        <div class="glass-card w-full max-w-md rounded-3xl p-10">

            <!-- Logo Area -->
            <div class="mb-10 text-center">

                <div
                    class="mb-4 inline-flex h-20 w-20 items-center justify-center rounded-full border border-white/10 bg-white/5 backdrop-blur-xl">

                    <span class="text-3xl text-amber-200">✦</span>

                </div>

                <h1 class="glow-text text-4xl font-semibold tracking-tight text-white">
                    PatternWise
                </h1>

                <p class="mt-4 text-sm leading-relaxed text-slate-300">
                    Decode Your Patterns.<br>
                    Design Your Life.
                </p>

            </div>

            <!-- Login Content -->
            <div class="space-y-6">

                <a href="/login/google"
                    class="group flex w-full items-center justify-center gap-4 rounded-2xl border border-white/10 bg-white/5 px-6 py-4 text-white transition duration-300 hover:bg-white/10 hover:shadow-2xl hover:shadow-cyan-500/10">

                    <!-- Google Icon -->
                    <svg class="h-6 w-6" viewBox="0 0 48 48">
                        <path fill="#FFC107"
                            d="M43.6 20.5H42V20H24v8h11.3C33.6 32.7 29.2 36 24 36c-6.6 0-12-5.4-12-12S17.4 12 24 12c3 0 5.7 1.1 7.8 3l5.7-5.7C34.1 6.1 29.3 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.3-.4-3.5z" />
                        <path fill="#FF3D00"
                            d="M6.3 14.7l6.6 4.8C14.7 15.2 19 12 24 12c3 0 5.7 1.1 7.8 3l5.7-5.7C34.1 6.1 29.3 4 24 4c-7.7 0-14.3 4.3-17.7 10.7z" />
                        <path fill="#4CAF50"
                            d="M24 44c5.2 0 10-2 13.5-5.2l-6.2-5.2C29.3 35 26.8 36 24 36c-5.2 0-9.6-3.3-11.2-8l-6.5 5C9.6 39.5 16.2 44 24 44z" />
                        <path fill="#1976D2"
                            d="M43.6 20.5H42V20H24v8h11.3c-1.1 3-3.4 5.3-6.5 6.8l6.2 5.2C39.7 36.5 44 31 44 24c0-1.3-.1-2.3-.4-3.5z" />
                    </svg>

                    <span class="text-sm font-medium tracking-wide">
                        Continue with Google
                    </span>

                </a>

            </div>

            <!-- Footer -->
            <div class="mt-10 text-center">

                <p class="text-xs leading-relaxed text-slate-400">
                    Symbolic intelligence for human potential.
                </p>

            </div>

        </div>

    </div>

</section>

{% endblock %}
