<form
    class="space-y-10"
>

    <div>

        <label class="mb-4 block text-sm uppercase tracking-[0.2em] text-slate-400">

            Birth Location

        </label>

        <input
            type="text"
            name="query"
            placeholder="Search city..."
            autocomplete="on"

            hx-get="/onboarding/location-search"
            hx-trigger="keyup changed delay:400ms"
            hx-target="#location-results"
            hx-swap="innerHTML"

            class="w-full rounded-2xl border border-white/10 bg-white/5 px-6 py-5 text-lg text-white outline-none transition focus:border-cyan-300"
        >

    </div>

    <div
        id="location-results"
        class="space-y-3"
    ></div>

</form>
