services:
  - type: web
    name: patternwise
    runtime: docker
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    autoDeploy: false
    envVars:
      - key: APP_ENV
        value: production
      - key: BASE_URL
        value: https://patternwise.in
      - key: ALLOWED_HOSTS
        value: patternwise.in,www.patternwise.in,*.onrender.com
      - key: WEB_CONCURRENCY
        value: "2"
      - key: DATABASE_URL
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false
